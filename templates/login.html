{% extends "base.html" %}

{% block content %}
<div class="d-flex justify-content-center align-items-center min-vh-100 bg-dark">
    <div class="text-center" style="width: 320px;">

        <!-- Форма входа -->
        <div id="loginFormContainer">
            <h2 class="text-light mb-4 fw-bold">Вход в панель</h2>
            
            <form id="loginForm" method="POST" action="{{ url_for('login') }}">
                <div class="mb-3">
                    <input type="text" class="form-control form-control-lg bg-dark text-light border-secondary" 
                           name="username" placeholder="Логин" required autofocus>
                </div>
                <div class="mb-4">
                    <input type="password" class="form-control form-control-lg bg-dark text-light border-secondary" 
                           name="password" placeholder="Пароль" required>
                </div>
                <button type="submit" class="btn btn-primary btn-lg w-100" id="submitBtn">
                    Войти
                </button>
            </form>
        </div>

        <!-- Экран загрузки -->
        <div id="loaderContainer" style="display: none;">
            <div class="mb-4">
                <img src="https://i.ibb.co/0jZ7Z7Z/session-logo.png" alt="Session Panel" width="110">
            </div>
            <h3 class="text-light fw-bold mb-4">SESSION PANEL</h3>
            
            <!-- Прогресс бар -->
            <div class="progress mb-3" style="height: 6px;">
                <div id="progressBar" class="progress-bar progress-bar-striped progress-bar-animated bg-info" 
                     role="progressbar" style="width: 0%"></div>
            </div>
            
            <p class="text-muted" id="loadingText">Проверка доступа...</p>
        </div>

    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.getElementById('loginForm').addEventListener('submit', function() {
    // Скрываем форму
    document.getElementById('loginFormContainer').style.display = 'none';
    // Показываем загрузку
    document.getElementById('loaderContainer').style.display = 'block';

    // Анимация прогресс-бара
    let progress = 0;
    const progressBar = document.getElementById('progressBar');
    const loadingText = document.getElementById('loadingText');
    
    const interval = setInterval(() => {
        progress += Math.random() * 12;
        if (progress > 92) progress = 92;
        progressBar.style.width = progress + '%';
        
        if (progress > 65) {
            loadingText.textContent = "Загрузка сессии...";
        }
        if (progress > 85) {
            loadingText.textContent = "Проверка прав доступа...";
        }
    }, 80);
});
</script>
{% endblock %}
